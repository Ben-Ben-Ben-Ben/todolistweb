<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Web To-Do List</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" , href="styles.css">
</head>

<body>
    <h1 id="Header">To-Do List Maker</h1>
    <div class="MainContent">
        <div class="TopBar"> <!-- topbar for configuring items -->
            <span>
                Navigation Menu
            </span>
            <span>
                <button id="FullClear">
                    Clear Categories
                </button>
                <button id="AddCategory">
                    Add Category
                </button>
            </span>
        </div>

        <div class="CategoryList" id="CategoryRoot"> <!-- lower bar for actual items-->

        </div>
    </div>

    <script src="index.js"></script>

</body>

</html>
